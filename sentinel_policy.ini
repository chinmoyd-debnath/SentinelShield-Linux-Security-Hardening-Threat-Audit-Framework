[SSH]
PermitRootLogin=no
PasswordAuthentication=no
PermitEmptyPasswords=no
MaxAuthTries=3
LoginGraceTime=30
X11Forwarding=no
AllowTcpForwarding=no
ClientAliveInterval=300
ClientAliveCountMax=2

[SCAN]
MaxWorldWritableFiles=50
MaxWorldWritableDirs=50
WorldWritableTopN=10
SUIDScanTopN=30
PortsScanTopN=40
DeepScan=false

[NETWORK]
ScanOpenPorts=true
AllowedPortsTCP=22,80,443
AllowedPortsUDP=53,123

[SERVICES]
ListRunningServices=true
ListEnabledServices=true
DisallowServices=telnet,vsftpd,rsh-server,rcp
AllowServices=ssh,cron,rsyslog

[HARDENING]
EnableSSHHardening=true
EnablePermissionsHardening=false
EnableServiceHardening=false
EnableFirewallHardening=false

[REPORT]
ReportFormat=text
IncludeTopFindings=true
IncludeSystemInfo=true
ScoringMode=heuristic
